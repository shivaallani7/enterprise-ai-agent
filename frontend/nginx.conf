# This file is processed at container startup by docker-entrypoint.sh.
# Only ${NGINX_BACKEND_URL} is substituted — all other $var nginx directives
# (e.g. $host, $remote_addr) are passed through unchanged.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Proxies /api/* → backend Container App over HTTPS.
    # proxy_buffering off + chunked_transfer_encoding are required for SSE:
    # without them nginx buffers the entire response before forwarding it,
    # which breaks streaming completely.
    location /api/ {
        proxy_pass ${NGINX_BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for HTTPS proxy_pass with SNI (ACA uses SNI-based TLS)
        proxy_ssl_server_name on;
        # SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── SPA routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
